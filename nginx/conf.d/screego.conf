# HTTP → HTTPS リダイレクト + Let's Encrypt ACME チャレンジ
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt の ACME チャレンジ用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # それ以外は HTTPS へリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: Screego リバースプロキシ
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name SCREEGO_DOMAIN_PLACEHOLDER;

    # TLS 証明書 (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/SCREEGO_DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SCREEGO_DOMAIN_PLACEHOLDER/privkey.pem;

    # TLS 設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # クライアント実 IP を screego へ転送
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # アップロードサイズ制限
    client_max_body_size 10m;

    # Screego メインアプリ
    location / {
        proxy_pass http://screego:5050;
        proxy_http_version 1.1;

        # WebSocket サポート
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
