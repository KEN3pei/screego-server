apiVersion: v1
kind: Service
metadata:
  name: screego
  namespace: screego
spec:
  # hostNetwork: true のため ClusterIP で十分
  # ノード上のポートに直接アクセス可能
  type: ClusterIP
  selector:
    app: screego
  ports:
    - name: http
      port: 5050
      targetPort: 5050
      protocol: TCP
    - name: turn-tcp
      port: 3478
      targetPort: 3478
      protocol: TCP
    - name: turn-udp
      port: 3478
      targetPort: 3478
      protocol: UDP
