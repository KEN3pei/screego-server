---
# Sealed Secrets Controller
# https://github.com/bitnami-labs/sealed-secrets
#
# このファイルは Sealed Secrets Controller を kube-system にインストールする。
# Controller がクラスター内で公開鍵・秘密鍵を管理し、SealedSecret を復号して Secret を生成する。
#
# インストール方法:
#   kubectl apply -f manifests/sealed-secrets-controller.yaml
#
# または Helm でインストール:
#   helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#   helm install sealed-secrets -n kube-system sealed-secrets/sealed-secrets

# 最新バージョンは以下で確認:
# https://github.com/bitnami-labs/sealed-secrets/releases
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-unsealer
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete", "watch"]
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bitnami.com"]
    resources: ["sealedsecrets/status"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sealed-secrets-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-unsealer
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-controller
    namespace: kube-system
